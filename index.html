<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevAgency App Loading...</title>

  <!-- Auto Redirect -->
  <meta http-equiv="refresh" content="5;url=https://abstryaproject.github.io/devagency/">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 400px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .loader {
      margin: 30px auto;
      border: 4px solid rgba(255,255,255,0.1);
      border-top: 4px solid #38bdf8;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    p {
      font-size: 14px;
      opacity: 0.8;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #38bdf8;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">DevAgency</div>

    <h2>App Not Ready Yet 🚧</h2>

    <div class="loader"></div>

    <p>
      We're still setting things up on this domain.<br>
      Redirecting you to our main application...
    </p>

    <a href="https://abstryaproject.github.io/devagency/" class="btn">
      Continue Now
    </a>
  </div>
</body>
</html>
